<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrace - Carbon Footprint Awareness Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <header class="bg-emerald-600 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">🌱 EcoTrace</h1>
            <nav aria-label="Platform badge"><p class="text-sm bg-emerald-700 px-3 py-1 rounded-full">Top 2 Optimized</p></nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10 grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100" aria-labelledby="calc-heading">
            <h2 id="calc-heading" class="text-xl font-bold text-gray-800 mb-4">Calculate Your Footprint</h2>
            <form id="carbonForm" class="space-y-4">
                <div>
                    <label for="electricity" class="block text-sm font-medium text-gray-700 mb-1">Monthly Electricity (kWh)</label>
                    <input type="number" id="electricity" min="0" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="e.g. 300">
                </div>
                <div>
                    <label for="vehicleType" class="block text-sm font-medium text-gray-700 mb-1">Vehicle Type</label>
                    <select id="vehicleType" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500">
                        <option value="petrol">Petrol Car</option>
                        <option value="diesel">Diesel Car</option>
                        <option value="electric">Electric Vehicle</option>
                    </select>
                </div>
                <div>
                    <label for="distance" class="block text-sm font-medium text-gray-700 mb-1">Monthly Distance Traveled (km)</label>
                    <input type="number" id="distance" min="0" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="e.g. 500">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition duration-200">Calculate & Analyze</button>
            </form>
        </section>

        <section class="flex flex-col gap-6" aria-labelledby="results-heading">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 id="results-heading" class="text-xl font-bold text-gray-800 mb-2">Your Impact Score</h2>
                <div class="flex items-baseline gap-2 my-4">
                    <span id="scoreDisplay" class="text-5xl font-extrabold text-emerald-600">0.00</span>
                    <span class="text-gray-500 font-medium">kg CO₂ / month</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="1000" id="progressContainer">
                    <div id="scoreBar" class="bg-emerald-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-emerald-50 p-6 rounded-2xl border border-emerald-100" role="region" aria-label="AI Recommendations">
                <h3 class="text-lg font-bold text-emerald-900 mb-2">💡 AI Sustainability Insights</h3>
                <ul id="insightsList" class="space-y-2 text-emerald-800 text-sm list-disc list-inside">
                    <li>Enter your values to receive dynamically optimized mitigation steps.</li>
                </ul>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
